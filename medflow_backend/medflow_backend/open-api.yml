openapi: 3.0.3
info:
  title: MedFlow Backend API
  version: 1.2.0
  description: |
    Contrato OpenAPI del estado actual del backend de MedFlow.

    Este archivo documenta los modulos implementados hasta ahora y sirve como referencia comun
    para desarrollo backend, frontend, pruebas manuales y futura automatizacion.

    Contexto util para el equipo:
    - El MVP actual esta orientado a gestion administrativa del consultorio.
    - Ya existen CRUDs funcionales para pacientes, doctores y procedimientos.
    - Ya existe gestion de citas con validaciones basicas de agenda.
    - Ya existe registro y consulta de historias clinicas asociadas a citas.
    - Ya existe calendario medico con integracion de citas y eventos propios del doctor.
    - Autenticacion y facturacion siguen pendientes de implementacion.

    Reglas de negocio ya activas:
    - Pacientes no pueden repetir documento ni email.
    - Doctores no pueden repetir registro medico ni email.
    - Procedimientos no pueden repetir nombre.
    - Una cita debe programarse en una fecha futura.
    - Un doctor no puede tener dos citas a la misma fecha y hora.
    - Un paciente no puede tener dos citas a la misma fecha y hora.
    - Los estados de cita validos actualmente son PROGRAMADA, COMPLETADA y CANCELADA.
    - Una cita solo puede tener una historia clinica.
    - No se permite crear historia clinica para una cita cancelada.
    - Al crear una historia clinica, la cita asociada queda marcada como COMPLETADA.
    - Los registros clinicos requieren diagnostico, observaciones y datos relevantes.
    - El calendario medico muestra citas y eventos en una misma respuesta.
    - El fin de una cita en calendario se calcula con fechaHora + duracionMinutos del procedimiento.
    - Los eventos de calendario deben tener fin posterior al inicio.
    - Un evento de calendario no puede cruzarse con citas activas ni con otros eventos del mismo doctor.
servers:
  - url: http://localhost:8080
    description: Servidor local de desarrollo

tags:
  - name: Pacientes
    description: Gestion del directorio de pacientes del consultorio.
  - name: Doctores
    description: Catalogo de doctores disponibles para agenda y atencion.
  - name: Procedimientos
    description: Catalogo base de servicios o procedimientos medicos.
  - name: Citas
    description: Agendamiento y seguimiento operativo de citas.
  - name: Historias Clinicas
    description: Registro y consulta de diagnosticos, observaciones y datos relevantes asociados a citas.
  - name: Calendario Medico
    description: Vista unificada de citas y eventos propios del calendario del doctor.

paths:
  /api/pacientes:
    get:
      tags: [Pacientes]
      summary: Listar pacientes
      description: |
        Devuelve todos los pacientes ordenados por nombre.
        Si se envia `busqueda`, filtra por nombre, documento o email.
      parameters:
        - name: busqueda
          in: query
          required: false
          description: Texto libre para buscar por nombre, documento o email.
          schema:
            type: string
      responses:
        '200':
          description: Lista de pacientes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PacienteResponse'
    post:
      tags: [Pacientes]
      summary: Crear paciente
      description: Registra un nuevo paciente en el sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PacienteRequest'
            examples:
              ejemplo:
                value:
                  nombreCompleto: Ana Perez
                  documento: "123456789"
                  telefono: "3001234567"
                  email: ana.perez@correo.com
                  direccion: Calle 10 # 20-30
      responses:
        '201':
          description: Paciente creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacienteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/pacientes/{id}:
    get:
      tags: [Pacientes]
      summary: Obtener paciente por id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Paciente encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacienteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Pacientes]
      summary: Actualizar paciente
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PacienteRequest'
      responses:
        '200':
          description: Paciente actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacienteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Pacientes]
      summary: Eliminar paciente
      description: Elimina el paciente por id.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Paciente eliminado correctamente.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/doctores:
    get:
      tags: [Doctores]
      summary: Listar doctores
      description: |
        Devuelve todos los doctores ordenados por nombre.
        Si se envia `busqueda`, filtra por nombre, especialidad o registro medico.
      parameters:
        - name: busqueda
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de doctores.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DoctorResponse'
    post:
      tags: [Doctores]
      summary: Crear doctor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorRequest'
            examples:
              ejemplo:
                value:
                  nombreCompleto: Dra. Laura Gomez
                  especialidad: Medicina General
                  registroMedico: RM-001
                  email: laura.gomez@medflow.com
      responses:
        '201':
          description: Doctor creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/doctores/{id}:
    get:
      tags: [Doctores]
      summary: Obtener doctor por id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Doctor encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Doctores]
      summary: Actualizar doctor
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DoctorRequest'
      responses:
        '200':
          description: Doctor actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DoctorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Doctores]
      summary: Eliminar doctor
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Doctor eliminado correctamente.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/procedimientos:
    get:
      tags: [Procedimientos]
      summary: Listar procedimientos
      description: |
        Devuelve el catalogo de procedimientos ordenado por nombre.
        Si se envia `busqueda`, filtra por nombre.
      parameters:
        - name: busqueda
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Lista de procedimientos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcedimientoResponse'
    post:
      tags: [Procedimientos]
      summary: Crear procedimiento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcedimientoRequest'
            examples:
              ejemplo:
                value:
                  nombre: Consulta General
                  precio: 120000
                  duracionMinutos: 30
      responses:
        '201':
          description: Procedimiento creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcedimientoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/procedimientos/{id}:
    get:
      tags: [Procedimientos]
      summary: Obtener procedimiento por id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Procedimiento encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcedimientoResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Procedimientos]
      summary: Actualizar procedimiento
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcedimientoRequest'
      responses:
        '200':
          description: Procedimiento actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcedimientoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Procedimientos]
      summary: Eliminar procedimiento
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Procedimiento eliminado correctamente.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/citas:
    get:
      tags: [Citas]
      summary: Listar citas
      description: |
        Devuelve las citas ordenadas por fecha y hora.
        Si se envia `fecha`, filtra solo las citas de ese dia.
      parameters:
        - name: fecha
          in: query
          required: false
          description: Fecha a consultar en formato YYYY-MM-DD.
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Lista de citas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CitaResponse'
    post:
      tags: [Citas]
      summary: Crear cita
      description: |
        Agenda una cita validando existencia de paciente, doctor y procedimiento.
        Ademas, evita cruces exactos de agenda para doctor y paciente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitaRequest'
            examples:
              ejemplo:
                value:
                  pacienteId: 1
                  doctorId: 1
                  procedimientoId: 1
                  fechaHora: '2026-04-20T10:00:00'
                  estado: PROGRAMADA
      responses:
        '201':
          description: Cita creada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/citas/{id}:
    get:
      tags: [Citas]
      summary: Obtener cita por id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Cita encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitaResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Citas]
      summary: Actualizar cita
      description: Reprograma o modifica una cita existente.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CitaRequest'
      responses:
        '200':
          description: Cita actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Citas]
      summary: Eliminar cita
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Cita eliminada correctamente.
        '404':
          $ref: '#/components/responses/NotFound'

  /api/citas/{id}/cancelar:
    patch:
      tags: [Citas]
      summary: Cancelar cita
      description: Marca la cita como CANCELADA sin eliminar su registro.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Cita cancelada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CitaResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/historias-clinicas:
    get:
      tags: [Historias Clinicas]
      summary: Listar historias clinicas
      description: Devuelve todas las historias clinicas ordenadas por fecha de registro descendente.
      responses:
        '200':
          description: Lista de historias clinicas.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoriaClinicaResponse'
    post:
      tags: [Historias Clinicas]
      summary: Agregar registro a historia clinica
      description: |
        Crea un registro de historia clinica asociado a una cita existente.
        El paciente y el doctor se toman desde la cita, no se envian manualmente.
        El registro captura diagnostico, observaciones y datos relevantes.
        Si la cita esta cancelada o ya tiene historia clinica, se devuelve conflicto.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoriaClinicaRequest'
            examples:
              ejemplo:
                value:
                  citaId: 1
                  diagnostico: Faringitis aguda
                  observaciones: Paciente refiere dolor de garganta de dos dias de evolucion. Se indican cuidados generales y control si empeora.
                  datosRelevantes: Sin alergias reportadas. Signos vitales dentro de rangos normales.
      responses:
        '201':
          description: Historia clinica creada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoriaClinicaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/historias-clinicas/{id}:
    get:
      tags: [Historias Clinicas]
      summary: Obtener historia clinica por id
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Historia clinica encontrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoriaClinicaResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Historias Clinicas]
      summary: Actualizar registro de historia clinica
      description: |
        Actualiza diagnostico, observaciones y datos relevantes manteniendo la misma cita asociada.
        No permite cambiar la cita de una historia clinica ya creada.
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HistoriaClinicaRequest'
      responses:
        '200':
          description: Historia clinica actualizada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoriaClinicaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/calendario:
    get:
      tags: [Calendario Medico]
      summary: Ver calendario medico
      description: |
        Devuelve una vista unificada del calendario de un doctor.
        Integra citas existentes y eventos creados manualmente.
        Las citas se devuelven como tipo `CITA`; los eventos manuales como tipo `EVENTO`.
      parameters:
        - name: doctorId
          in: query
          required: true
          description: Identificador del doctor propietario del calendario.
          schema:
            type: integer
            format: int32
        - name: desde
          in: query
          required: true
          description: Inicio del rango en formato ISO date-time.
          schema:
            type: string
            format: date-time
          example: '2026-04-30T00:00:00'
        - name: hasta
          in: query
          required: true
          description: Fin del rango en formato ISO date-time.
          schema:
            type: string
            format: date-time
          example: '2026-05-01T00:00:00'
      responses:
        '200':
          description: Elementos del calendario.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarEventResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/calendario/eventos:
    post:
      tags: [Calendario Medico]
      summary: Crear evento de calendario
      description: |
        Crea un evento manual en el calendario del doctor.
        Este endpoint no crea citas; solo eventos personalizados como reuniones, bloqueos o actividades administrativas.
        El sistema evita cruces con citas activas y con otros eventos del mismo doctor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalendarEventRequest'
            examples:
              ejemplo:
                value:
                  doctorId: 1
                  titulo: Reunion administrativa
                  descripcion: Revision de agenda semanal
                  inicio: '2026-04-30T14:00:00'
                  fin: '2026-04-30T15:00:00'
      responses:
        '201':
          description: Evento creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/historias-clinicas/paciente/{pacienteId}:
    get:
      tags: [Historias Clinicas]
      summary: Listar historias clinicas por paciente
      parameters:
        - name: pacienteId
          in: path
          required: true
          description: Identificador del paciente.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Historial clinico del paciente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoriaClinicaResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Identificador numerico del recurso.
      schema:
        type: integer
        format: int32

  responses:
    BadRequest:
      description: La solicitud contiene errores de validacion.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            ejemplo:
              value:
                mensaje: La solicitud contiene errores de validacion
                errores:
                  - email: El email debe tener un formato valido
                  - nombreCompleto: El nombre completo es obligatorio
    NotFound:
      description: El recurso solicitado no existe.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            ejemplo:
              value:
                mensaje: Paciente no encontrado con id 99
                errores: []
    Conflict:
      description: La operacion entra en conflicto con reglas de negocio o duplicados.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
          examples:
            duplicado:
              value:
                mensaje: Ya existe un paciente con el documento 123456789
                errores: []
            agenda:
              value:
                mensaje: El doctor ya tiene una cita programada en esa fecha y hora
                errores: []

  schemas:
    PacienteRequest:
      type: object
      required:
        - nombreCompleto
        - documento
        - telefono
        - email
        - direccion
      properties:
        nombreCompleto:
          type: string
          maxLength: 150
          example: Ana Perez
        documento:
          type: string
          maxLength: 30
          example: "123456789"
        telefono:
          type: string
          maxLength: 30
          example: "3001234567"
        email:
          type: string
          format: email
          maxLength: 120
          example: ana.perez@correo.com
        direccion:
          type: string
          maxLength: 200
          example: Calle 10 # 20-30

    PacienteResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
        nombreCompleto:
          type: string
          example: Ana Perez
        documento:
          type: string
          example: "123456789"
        telefono:
          type: string
          example: "3001234567"
        email:
          type: string
          format: email
          example: ana.perez@correo.com
        direccion:
          type: string
          example: Calle 10 # 20-30

    DoctorRequest:
      type: object
      required:
        - nombreCompleto
        - especialidad
        - registroMedico
        - email
      properties:
        nombreCompleto:
          type: string
          maxLength: 150
          example: Dra. Laura Gomez
        especialidad:
          type: string
          maxLength: 100
          example: Medicina General
        registroMedico:
          type: string
          maxLength: 80
          example: RM-001
        email:
          type: string
          format: email
          maxLength: 120
          example: laura.gomez@medflow.com

    DoctorResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
        nombreCompleto:
          type: string
          example: Dra. Laura Gomez
        especialidad:
          type: string
          example: Medicina General
        registroMedico:
          type: string
          example: RM-001
        email:
          type: string
          format: email
          example: laura.gomez@medflow.com

    ProcedimientoRequest:
      type: object
      required:
        - nombre
        - precio
        - duracionMinutos
      properties:
        nombre:
          type: string
          maxLength: 120
          example: Consulta General
        precio:
          type: number
          format: double
          minimum: 0.01
          example: 120000
        duracionMinutos:
          type: integer
          format: int32
          minimum: 1
          example: 30

    ProcedimientoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int32
          example: 1
        nombre:
          type: string
          example: Consulta General
        precio:
          type: number
          format: double
          example: 120000
        duracionMinutos:
          type: integer
          format: int32
          example: 30

    CitaRequest:
      type: object
      required:
        - pacienteId
        - doctorId
        - procedimientoId
        - fechaHora
      properties:
        pacienteId:
          type: integer
          format: int32
          example: 1
        doctorId:
          type: integer
          format: int32
          example: 1
        procedimientoId:
          type: integer
          format: int32
          example: 1
        fechaHora:
          type: string
          format: date-time
          example: '2026-04-20T10:00:00'
        estado:
          type: string
          maxLength: 50
          description: |
            Opcional. Si no se envia, el backend asigna PROGRAMADA.
            Valores validos actualmente: PROGRAMADA, COMPLETADA, CANCELADA.
