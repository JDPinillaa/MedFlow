spring.application.name=medflow

spring.datasource.url=jdbc:mysql://localhost:3306/clinica_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:medflow-dev-secret-key-change-before-production-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
